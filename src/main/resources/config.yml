# PeRoCasino 設定

roulette:
  # ルーレット拠点（砥石）の座標。未設定なら近接UIは出ません。
  # /perocasino roulette set で現在見ている砥石を登録
  world: ""
  x: 0
  y: 0
  z: 0
  # ルーレット拠点からこの距離以内のプレイヤーにフェーズ表示（BossBar）
  notify-radius: 40
  # ベット待ち（秒）
  bet-seconds: 20
  # ルーレット演出（秒）
  spin-seconds: 3
  # 次ラウンドまでのクールダウン（秒）
  cooldown-seconds: 5
  # ルーレットの当たり判定（上部の針＝角度0°）の角度セグメント定義。
  # - unit は「度」。分解能は 1° 以上にしてください。
  # - 角度の合計は 360° である必要があります。
  # - 高倍率ほど僅かに範囲が広くなる想定（例: 20x は 20〜25°程度）
  #
  # この設定に沿って、あなたが3×3表示用のルーレット画像を作成できます。
  segments:
    # 合計360°（20x=24°, 10x=23°, 6x=22°, 4x=21°, 2x=20°）× 6周
    # 「倍率が高いほど幅が広い」を保ったまま、周回で見た目を増やす構成です。
    # 針(0°)から時計回りにこの順で並びます。
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24
    - multiplier: 2
      degrees: 20
    - multiplier: 4
      degrees: 21
    - multiplier: 6
      degrees: 22
    - multiplier: 10
      degrees: 23
    - multiplier: 20
      degrees: 24

quarry:
  enabled: true
  # 採石場として扱うワールド名（空なら全ワールド）
  world: ""
  # 角2点（含まれる立方体領域）。未設定なら採石場機能は無効
  min:
    x: 0
    y: 0
    z: 0
  max:
    x: 0
    y: 0
    z: 0
  # ダイヤ鉱石を掘ったあと、何tick後に元に戻すか（20tick=1秒）
  respawn-delay-ticks: 6000

slot-machine:
  # スロットの鉱石シンボル（上から順に回転表示）
  symbols:
    - COAL_ORE
    - COPPER_ORE
    - IRON_ORE
    - GOLD_ORE
    - REDSTONE_ORE
    - LAPIS_ORE
    - EMERALD_ORE
    - DIAMOND_ORE
    - NETHERITE_SCRAP
  # スピン開始後、各リールが止まるまでのランダムtick（最小〜最大）
  spin-min-ticks: 40
  spin-max-ticks: 120
  # 払い戻し倍率（ベット額に掛ける）
  payouts:
    three-of-a-kind: 8
    two-of-a-kind: 2
  # スロット操作ボタン（ブロック座標）。右クリックで検知します。
  buttons:
    spin:
      world: ""
      x: 0
      y: 0
      z: 0
    stop1:
      world: ""
      x: 0
      y: 0
      z: 0
    stop2:
      world: ""
      x: 0
      y: 0
      z: 0
    stop3:
      world: ""
      x: 0
      y: 0
      z: 0
