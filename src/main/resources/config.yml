# PeRoCasino 設定

roulette:
  # ルーレット拠点（砥石）の座標。未設定なら近接UIは出ません。
  # /perocasino roulette set で現在見ている砥石を登録
  world: ""
  x: 0
  y: 0
  z: 0
  # ルーレット拠点からこの距離以内のプレイヤーにフェーズ表示（BossBar）
  notify-radius: 40
  # ベット待ち（秒）
  bet-seconds: 20
  # ルーレット演出（秒）
  spin-seconds: 3
  # 次ラウンドまでのクールダウン（秒）
  cooldown-seconds: 5
  # ルーレットの当たり判定（上部の針＝角度0°）の角度セグメント定義。
  # - unit は「度」。分解能は 1° 以上にしてください。
  # - 角度の合計は 360° である必要があります。
  # - 高倍率ほど僅かに範囲が広くなる想定（例: 20x は 20〜25°程度）
  #
  # この設定に沿って、あなたが3×3表示用のルーレット画像を作成できます。
  segments:
    # 24分割（各15°）で一周360°
    # 出現回数: 20x×1 / 10x×3 / 6x×4 / 4x×6 / 2x×10 = 24枠
    # 配置ルール:
    # - 10x と 20x は「四方（0°, 90°, 180°, 270°）」に配置（index 0,6,12,18）
    # - 4x と 6x は同じ数字が隣り合わない
    # - 2x は隣接してもOK
    # ※針(0°)から時計回りにこの順で並びます（index 0 が 0°〜15°）
    - { multiplier: 20, degrees: 15 } # 0
    - { multiplier: 2,  degrees: 15 } # 1
    - { multiplier: 4,  degrees: 15 } # 2
    - { multiplier: 2,  degrees: 15 } # 3
    - { multiplier: 6,  degrees: 15 } # 4
    - { multiplier: 2,  degrees: 15 } # 5
    - { multiplier: 10, degrees: 15 } # 6  (90°)
    - { multiplier: 2,  degrees: 15 } # 7
    - { multiplier: 4,  degrees: 15 } # 8
    - { multiplier: 2,  degrees: 15 } # 9
    - { multiplier: 6,  degrees: 15 } # 10
    - { multiplier: 4,  degrees: 15 } # 11
    - { multiplier: 10, degrees: 15 } # 12 (180°)
    - { multiplier: 2,  degrees: 15 } # 13
    - { multiplier: 4,  degrees: 15 } # 14
    - { multiplier: 2,  degrees: 15 } # 15
    - { multiplier: 6,  degrees: 15 } # 16
    - { multiplier: 2,  degrees: 15 } # 17
    - { multiplier: 10, degrees: 15 } # 18 (270°)
    - { multiplier: 2,  degrees: 15 } # 19
    - { multiplier: 4,  degrees: 15 } # 20
    - { multiplier: 2,  degrees: 15 } # 21
    - { multiplier: 6,  degrees: 15 } # 22
    - { multiplier: 4,  degrees: 15 } # 23

nether-portal:
  # ネザーポータルに触れた瞬間、固定座標へテレポートさせる
  enabled: false
  to:
    world: ""
    x: 0
    y: 0
    z: 0

quarry:
  enabled: true
  # 採石場として扱うワールド名（空なら全ワールド）
  world: ""
  # 角2点（含まれる立方体領域）。未設定なら採石場機能は無効
  min:
    x: 0
    y: 0
    z: 0
  max:
    x: 0
    y: 0
    z: 0
  # ダイヤ鉱石を掘ったあと、何tick後に元に戻すか（20tick=1秒）
  respawn-delay-ticks: 6000

slot-machine:
  # スロットの鉱石シンボル（上から順に回転表示）
  symbols:
    - COAL_ORE
    - COPPER_ORE
    - IRON_ORE
    - GOLD_ORE
    - REDSTONE_ORE
    - LAPIS_ORE
    - EMERALD_ORE
    - DIAMOND_ORE
    - NETHERITE_SCRAP
  # スピン開始後、各リールが止まるまでのランダムtick（最小〜最大）
  spin-min-ticks: 40
  spin-max-ticks: 120
  # 払い戻し倍率（ベット額に掛ける）
  payouts:
    three-of-a-kind: 8
    two-of-a-kind: 2
  # スロット操作ボタン（ブロック座標）。右クリックで検知します。
  buttons:
    spin:
      world: ""
      x: 0
      y: 0
      z: 0
    stop1:
      world: ""
      x: 0
      y: 0
      z: 0
    stop2:
      world: ""
      x: 0
      y: 0
      z: 0
    stop3:
      world: ""
      x: 0
      y: 0
      z: 0
